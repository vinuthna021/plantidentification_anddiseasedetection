services:
  - type: web
    name: plant-disease-detection
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    rootDir: flask_app
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
